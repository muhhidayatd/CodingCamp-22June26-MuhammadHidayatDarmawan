<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div>
        <h1>Expense &amp; Budget Visualizer</h1>
      </div>
      
      <button id="theme-toggle" class="theme-btn">
            🌙
          </button>
      <!-- Balance Display -->
      <section class="balance-section">
        <h2>Total Balance</h2>
        <p id="balance-display">$0.00</p>
      </section>

      <!-- Add Transaction Form -->
      <section class="form-section">
        <h2>Add Transaction</h2>
        <form id="transaction-form" novalidate>
          <div class="field-group">
            <label for="input-name">Item Name</label>
            <input
              id="input-name"
              type="text"
              maxlength="100"
              placeholder="e.g. Lunch at cafe"
              required
            />
            <span class="error-msg"></span>
          </div>

          <div class="field-group">
            <label for="input-amount">Amount ($)</label>
            <input
              id="input-amount"
              type="number"
              min="0.01"
              max="999999999.99"
              step="0.01"
              placeholder="0.00"
              required
            />
            <span class="error-msg"></span>
          </div>

          <div class="field-group">
            <label for="input-category">Category</label>
            <select id="input-category">
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
            <span class="error-msg"></span>
          </div>

          <button type="submit">Add Transaction</button>
        </form>
      </section>

      <!-- Transaction List -->
      <section class="list-section">
        <h2>Transactions</h2>
        <ul id="transaction-list"></ul>
      </section>

      <!-- Chart Section -->
      <section class="chart-section">
        <h2>Spending by Category</h2>
        <canvas id="spending-chart"></canvas>
        <p id="chart-placeholder">No data to display</p>
      </section>
    </div>

    <!-- Warning Toast -->
    <div id="warning-toast" class="toast hidden">
      <span class="toast-message"></span>
      <button class="toast-close" aria-label="Dismiss warning">&times;</button>
    </div>

    <!-- Chart.js CDN (pinned version) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <!-- Local app script -->
    <script src="js/app.js" defer></script>
  </body>
</html>
